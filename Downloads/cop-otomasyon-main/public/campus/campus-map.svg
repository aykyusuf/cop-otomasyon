<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#0f172a"/>
  <rect width="1000" height="700" fill="url(#grid)"/>

  <!-- Roads -->
  <g stroke="#334155" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main horizontal road -->
    <path d="M 0 350 L 1000 350"/>
    <!-- Main vertical road -->
    <path d="M 500 0 L 500 700"/>
    <!-- Secondary roads -->
    <path d="M 100 200 L 400 200 L 400 500 L 100 500 Z"/>
    <path d="M 600 150 L 900 150 L 900 500 L 600 500 Z"/>
    <path d="M 250 350 L 250 600"/>
    <path d="M 750 350 L 750 600"/>
  </g>

  <!-- Green areas -->
  <g opacity="0.15">
    <circle cx="500" cy="350" r="60" fill="#22c55e"/>
    <ellipse cx="150" cy="350" rx="40" ry="25" fill="#22c55e"/>
    <ellipse cx="850" cy="350" rx="40" ry="25" fill="#22c55e"/>
    <rect x="420" y="550" width="160" height="80" rx="10" fill="#22c55e"/>
  </g>

  <!-- Trees -->
  <g fill="#166534" opacity="0.4">
    <circle cx="480" cy="310" r="8"/><circle cx="520" cy="310" r="8"/>
    <circle cx="480" cy="390" r="8"/><circle cx="520" cy="390" r="8"/>
    <circle cx="500" cy="330" r="6"/><circle cx="500" cy="370" r="6"/>
  </g>

  <!-- Buildings -->
  <!-- Muhendislik Fakultesi (top-left) -->
  <g>
    <rect x="120" y="80" width="180" height="100" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
    <text x="210" y="125" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui" font-weight="600">MUHENDISLIK</text>
    <text x="210" y="145" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui" opacity="0.7">Fakultesi</text>
  </g>

  <!-- Fen Fakultesi (top-right) -->
  <g>
    <rect x="620" y="80" width="180" height="100" rx="6" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>
    <text x="710" y="125" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui" font-weight="600">FEN</text>
    <text x="710" y="145" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="system-ui" opacity="0.7">Fakultesi</text>
  </g>

  <!-- Edebiyat Fakultesi (mid-left) -->
  <g>
    <rect x="120" y="250" width="160" height="80" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <text x="200" y="290" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui" font-weight="600">EDEBIYAT</text>
    <text x="200" y="305" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui" opacity="0.7">Fakultesi</text>
  </g>

  <!-- Yemekhane (center) -->
  <g>
    <rect x="400" y="400" width="200" height="100" rx="6" fill="#1e3a5f" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <text x="500" y="445" text-anchor="middle" fill="#f87171" font-size="11" font-family="system-ui" font-weight="600">YEMEKHANE</text>
    <text x="500" y="465" text-anchor="middle" fill="#f87171" font-size="9" font-family="system-ui" opacity="0.7">Merkez</text>
  </g>

  <!-- Kutuphane (bottom-left) -->
  <g>
    <rect x="120" y="450" width="160" height="80" rx="6" fill="#1e3a5f" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
    <text x="200" y="490" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui" font-weight="600">KUTUPHANE</text>
    <text x="200" y="505" text-anchor="middle" fill="#34d399" font-size="9" font-family="system-ui" opacity="0.7">Merkez</text>
  </g>

  <!-- Spor Tesisleri (bottom-right) -->
  <g>
    <rect x="650" y="450" width="180" height="100" rx="6" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="740" y="495" text-anchor="middle" fill="#22d3ee" font-size="11" font-family="system-ui" font-weight="600">SPOR</text>
    <text x="740" y="515" text-anchor="middle" fill="#22d3ee" font-size="9" font-family="system-ui" opacity="0.7">Tesisleri</text>
  </g>

  <!-- Campus center label -->
  <text x="500" y="355" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui" opacity="0.5">MERKEZ ALAN</text>

  <!-- Parking areas -->
  <g fill="#1e293b" stroke="#475569" stroke-width="0.5" opacity="0.5">
    <rect x="350" y="80" width="80" height="40" rx="4"/>
    <text x="390" y="105" text-anchor="middle" fill="#64748b" font-size="7" font-family="system-ui">P</text>
    <rect x="850" y="250" width="80" height="40" rx="4"/>
    <text x="890" y="275" text-anchor="middle" fill="#64748b" font-size="7" font-family="system-ui">P</text>
  </g>

  <!-- Depot / Starting point for collection truck -->
  <g>
    <rect x="460" y="620" width="80" height="50" rx="6" fill="#292524" stroke="#a3e635" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="500" y="645" text-anchor="middle" fill="#a3e635" font-size="8" font-family="system-ui" font-weight="600">DEPO</text>
    <text x="500" y="658" text-anchor="middle" fill="#a3e635" font-size="7" font-family="system-ui" opacity="0.7">Toplama Araci</text>
  </g>
</svg>
